name: Microsoft Security DevOps

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 9 * * *" # Every day at 9:23 AM UTC

permissions:
  security-events: write

concurrency:
  group: msdo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  msdo:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run Microsoft Security DevOps
        uses: microsoft/security-devops-action@d0736c546281e0632667b8e0046ae3d7bba0bf67 # latest
        id: msdo
      - name: Upload results to Security tab
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v3.29.5
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}

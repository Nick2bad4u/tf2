name: OSSAR

# Define the events that trigger this workflow
on:
  push:
    branches: ["main"] # Trigger on push to the "main" branch
  pull_request:
    branches: ["main"] # Trigger on pull request to the "main" branch
  schedule:
    - cron: "41 10 * * 1" # Trigger on a schedule every Monday at 10:41 AM UTC

# Define permissions required for the workflow
permissions:
  contents: write # Required to fetch code using actions/checkout

concurrency:
  group: ossar-${{ github.ref }} # Group for concurrency control
  cancel-in-progress: false # Do not cancel in-progress jobs

jobs:
  OSSAR-Scan:
    # Define permissions for the OSSAR-Scan job
    permissions:
      contents: write # Required for actions/checkout to fetch code
      security-events: write # Required for github/codeql-action/upload-sarif to upload SARIF results
      actions: write # Only required for private repositories to get the Action run status

    # Specify the runner to use (windows-latest)
    runs-on: windows-latest

    steps:
      # Step to harden the runner for security purposes
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Step to checkout the repository
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Ensure a compatible version of dotnet is installed.
      # The [Microsoft Security Code Analysis CLI](https://aka.ms/mscadocs) is built with dotnet v3.1.201.
      # A version greater than or equal to v3.1.201 of dotnet must be installed on the agent in order to run this action.
      # GitHub hosted runners already have a compatible version of dotnet installed and this step may be skipped.
      # For self-hosted runners, ensure dotnet version 3.1.201 or later is installed by including this action:
      # - name: Install .NET
      #   uses: actions/setup-dotnet@v2
      #   with:
      #     dotnet-version: '3.1.x'

      # Run open source static analysis tools
      - name: Run OSSAR
        uses: github/ossar-action@4e96c4f6e591eb4b991abfd459e40b136a317aea # v2.0.0
        id: ossar

      # Upload results to the Security tab
      - name: Upload OSSAR results
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ steps.ossar.outputs.sarifFile }}
